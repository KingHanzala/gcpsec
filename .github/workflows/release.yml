name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build archive
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          mkdir -p dist pkg

          binary_name="gcpsec"
          ext=""
          if [ "${GOOS}" = "windows" ]; then
            ext=".exe"
          fi

          output="dist/${binary_name}${ext}"
          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${GITHUB_SHA} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "${output}" .

          archive_base="gcpsec_${VERSION#v}_${GOOS}_${GOARCH}"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            archive_path="pkg/${archive_base}.zip"
            (cd dist && zip -q "../${archive_path}" "${binary_name}${ext}")
          else
            archive_path="pkg/${archive_base}.tar.gz"
            tar -C dist -czf "${archive_path}" "${binary_name}${ext}"
          fi

          sha256sum "${archive_path}" > "${archive_path}.sha256"

          if [ "${GOOS}" = "linux" ]; then
            latest_archive="pkg/${binary_name}_linux_${GOARCH}.tar.gz"
            cp "${archive_path}" "${latest_archive}"
            sha256sum "${latest_archive}" > "${latest_archive}.sha256"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: pkg/*

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Add installer scripts
        shell: bash
        run: |
          set -euo pipefail
          cp scripts/install.sh release-assets/install.sh
          cp scripts/install.ps1 release-assets/install.ps1
          chmod +x release-assets/install.sh

      - name: Create checksums bundle
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          cat ./*.sha256 > checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/*
